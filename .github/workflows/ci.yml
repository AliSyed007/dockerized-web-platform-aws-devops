name: DevOps Platform Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  terraform:
    name: Terraform Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: terraform fmt -check

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  ansible:
    name: Ansible Syntax Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ansible

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Syntax check playbook
        run: ansible-playbook playbook.yml --syntax-check

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t devops-flask-app:test .

  compose:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: compose

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate docker compose config
        run: docker compose config

  deploy:
    name: Deploy to EC2
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs:
      - terraform
      - ansible
      - docker
      - compose

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/devops-terraform-key
          chmod 600 ~/.ssh/devops-terraform-key

      - name: Add EC2 host to known_hosts
        run: |
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy app files
        run: |
          scp -i ~/.ssh/devops-terraform-key -r app ubuntu@${{ secrets.EC2_HOST }}:/opt/devops-docker-platform/

      - name: Copy nginx files
        run: |
          scp -i ~/.ssh/devops-terraform-key -r nginx ubuntu@${{ secrets.EC2_HOST }}:/opt/devops-docker-platform/

      - name: Copy compose files
        run: |
          scp -i ~/.ssh/devops-terraform-key -r compose ubuntu@${{ secrets.EC2_HOST }}:/opt/devops-docker-platform/

      - name: Deploy stack
        run: |
          ssh -i ~/.ssh/devops-terraform-key ubuntu@${{ secrets.EC2_HOST }} '
            set -e
            cd /opt/devops-docker-platform/compose
            docker compose up -d --build
            docker compose ps
          '

      - name: Health check
        run: |
          curl --fail http://${{ secrets.EC2_HOST }}/health
